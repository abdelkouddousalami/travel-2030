
spring:
  application:
    name: travel2030-backend

  datasource:
    url: jdbc:mysql://localhost:3306/travel2030?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: travel2030_user
    password: travel2030_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: Travel2030HikariPool


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false


  security:
    user:
      name: admin
      password: admin123


server:
  port: 8085
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true


app:
  jwt:
    secret: LZeX4pzsCDQXUPYXZ5zhYJNxrHHAzvGfh+RpdmOgZGf+FpC1seU5Tuo+T8L7qHlaSL4mk+lsglunIdnSuqAQsg==
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000
      - https://travel2030.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Type
    allow-credentials: true
    max-age: 3600


logging:
  level:
    root: INFO
    com.example.backend: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/travel2030.log
    max-size: 10MB
    max-history: 30

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:mysql://localhost:3306/travel2030_dev?createDatabaseIfNotExist=true&useSSL=false
logging:
  level:
    com.example.backend: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/travel2030?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: travel2030_user
    password: travel2030_pass

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
logging:
  level:
    root: WARN
    com.example.backend: INFO
app:
  jwt:
    secret: LZeX4pzsCDQXUPYXZ5zhYJNxrHHAzvGfh+RpdmOgZGf+FpC1seU5Tuo+T8L7qHlaSL4mk+lsglunIdnSuqAQsg==
    expiration-ms: 86400000
