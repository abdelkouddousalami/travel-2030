# Test configuration - Use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Configuration for tests
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdGVzdGluZy1wdXJwb3Nlcy1vbmx5LWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTUxMg==
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Disable mail during tests
spring.mail.host=localhost
spring.mail.port=2525
