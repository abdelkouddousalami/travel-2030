<div class="form-container">
  <header class="form-header fade-in">
    <h1 class="page-title">{{ isEditMode ? 'Modifier le Voyage' : 'Nouveau Voyage' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Modifiez les détails de votre voyage' : 'Planifiez votre prochaine aventure' }}</p>
  </header>

  <div class="loading-container" *ngIf="isLoading">
    <div class="loading-spinner"></div>
    <p>Chargement...</p>
  </div>

  <div class="error-banner" *ngIf="errorMessage">
    <span class="error-icon">[!]</span>
    {{ errorMessage }}
  </div>

  <form class="trip-form slide-up" *ngIf="!isLoading" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <div class="form-group full-width">
        <label class="form-label" for="title">Titre *</label>
        <input
          type="text"
          id="title"
          class="form-input"
          [(ngModel)]="trip.title"
          name="title"
          placeholder="Ex: Escapade à Paris"
          maxlength="200"
          required
        />
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="destination">Destination *</label>
        <input
          type="text"
          id="destination"
          class="form-input"
          [(ngModel)]="trip.destination"
          name="destination"
          placeholder="Ex: Paris, France"
          maxlength="500"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="startDate">Date de départ *</label>
        <input
          type="date"
          id="startDate"
          class="form-input"
          [(ngModel)]="trip.startDate"
          name="startDate"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="endDate">Date de retour *</label>
        <input
          type="date"
          id="endDate"
          class="form-input"
          [(ngModel)]="trip.endDate"
          name="endDate"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="budget">Budget (EUR)</label>
        <input
          type="number"
          id="budget"
          class="form-input"
          [(ngModel)]="trip.budget"
          name="budget"
          placeholder="0.00"
          min="0"
          step="0.01"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="status">Statut</label>
        <select id="status" class="form-input" [(ngModel)]="trip.status" name="status">
          <option value="PLANNING">En Planification</option>
          <option value="CONFIRMED">Confirmé</option>
          <option value="COMPLETED">Terminé</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="description">Description</label>
        <textarea
          id="description"
          class="form-textarea"
          [(ngModel)]="trip.description"
          name="description"
          placeholder="Décrivez votre voyage..."
          rows="4"
          maxlength="2000"
        ></textarea>
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="imageUrl">URL de l'image</label>
        <input
          type="url"
          id="imageUrl"
          class="form-input"
          [(ngModel)]="trip.imageUrl"
          name="imageUrl"
          placeholder="https://example.com/image.jpg"
        />
      </div>

      <div class="form-group full-width checkbox-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [(ngModel)]="trip.isPublic"
            name="isPublic"
          />
          <span class="checkbox-text">Rendre ce voyage public (visible par la communauté)</span>
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit" [disabled]="isSaving || !isFormValid()">
        {{ isSaving ? 'Enregistrement...' : (isEditMode ? 'Mettre à jour' : 'Créer le Voyage') }}
      </button>
      <button type="button" class="btn-cancel" (click)="cancel()">Annuler</button>
    </div>
  </form>
</div>
