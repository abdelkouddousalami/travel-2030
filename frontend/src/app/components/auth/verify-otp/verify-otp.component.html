<div class="auth-container">
  <div class="auth-card fade-in-up">
    <div class="auth-header">
      <div class="otp-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1 class="auth-title">VERIFICATION</h1>
      <p class="auth-subtitle">
        Un code a 6 chiffres a ete envoye a<br>
        <strong>{{ getMaskedEmail() }}</strong>
      </p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="alert alert-error">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Success Alert -->
    <div *ngIf="successMessage" class="alert alert-success">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      {{ successMessage }}
    </div>

    <!-- OTP Input -->
    <div class="otp-input-group" (paste)="onPaste($event)">
      <input
        *ngFor="let digit of otpDigits; let i = index"
        #otpInput
        type="text"
        maxlength="1"
        inputmode="numeric"
        autocomplete="one-time-code"
        class="otp-input"
        [class.filled]="otpDigits[i]"
        [value]="otpDigits[i]"
        (input)="onDigitInput($event, i)"
        (keydown)="onKeyDown($event, i)"
        [disabled]="isLoading"
      />
    </div>

    <!-- Verify Button -->
    <button
      class="btn btn-primary btn-block"
      (click)="verifyOtp()"
      [disabled]="isLoading || !isOtpComplete()"
    >
      <span *ngIf="!isLoading">Verifier</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>

    <!-- Resend Section -->
    <div class="resend-section">
      <p class="resend-text">Vous n'avez pas recu le code ?</p>
      <button
        class="btn-resend"
        (click)="resendOtp()"
        [disabled]="countdown > 0 || isResending"
      >
        <span *ngIf="isResending">Envoi en cours...</span>
        <span *ngIf="!isResending && countdown > 0">Renvoyer dans {{ countdown }}s</span>
        <span *ngIf="!isResending && countdown == 0">Renvoyer le code</span>
      </button>
    </div>

    <!-- Back to Register -->
    <div class="auth-footer">
      <a routerLink="/register" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Retour a l'inscription
      </a>
    </div>
  </div>
</div>
