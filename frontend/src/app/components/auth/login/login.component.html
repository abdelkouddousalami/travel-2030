<!-- ============================================================================
     Login Page
     ============================================================================ -->

<div class="auth-container">
  <div class="auth-card fade-in-up">
    <div class="auth-header">
      <h1 class="auth-title">CONNEXION</h1>
      <p class="auth-subtitle">Accédez à votre compte Travel2030</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="alert alert-error">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Username Field -->
      <div class="form-group">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          class="form-control"
          [class.is-invalid]="isFieldInvalid('username')"
          placeholder="Entrez votre nom d'utilisateur"
        />
        <div *ngIf="isFieldInvalid('username')" class="invalid-feedback">
          <span *ngIf="loginForm.get('username')?.errors?.['required']">
            Le nom d'utilisateur est requis
          </span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            class="form-control"
            [class.is-invalid]="isFieldInvalid('password')"
            placeholder="Entrez votre mot de passe"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePassword()"
            tabindex="-1"
          >
            <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <div *ngIf="isFieldInvalid('password')" class="invalid-feedback">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">
            Le mot de passe est requis
          </span>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Se souvenir de moi</span>
        </label>
        <a href="#" class="link">Mot de passe oublié?</a>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">Se Connecter</span>
        <span *ngIf="isLoading" class="loading-spinner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
            <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path>
          </svg>
          Connexion...
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">
      <span>OU</span>
    </div>

    <!-- Register Link -->
    <div class="auth-footer">
      <p>Vous n'avez pas de compte?</p>
      <a routerLink="/register" class="btn btn-secondary btn-block">
        Créer un Compte
      </a>
    </div>
  </div>

  <!-- Decorative Background -->
  <div class="auth-bg">
    <div class="auth-bg-circle auth-bg-circle-1"></div>
    <div class="auth-bg-circle auth-bg-circle-2"></div>
  </div>
</div>
