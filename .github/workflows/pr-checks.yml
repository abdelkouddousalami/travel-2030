name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Verify PR doesn't break the build
  verify:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify backend compiles
        working-directory: backend
        run: mvn compile -B -q

      - name: Verify frontend compiles
        working-directory: frontend
        run: npm run build

      - name: Summary
        run: |
          echo "## Build Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend compiled successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend built successfully" >> $GITHUB_STEP_SUMMARY
